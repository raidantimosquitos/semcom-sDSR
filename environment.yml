# LDPC scripts need pyldpc (PyPI sdist). Conda's env pip step cannot pass
# --no-build-isolation, so install it after the env exists, e.g.:
#   conda run -n sDSR pip install --no-build-isolation pyldpc
# or: bash scripts/bootstrap_conda_env.sh
name: sDSR
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch
  - torchaudio
  - numpy
  - scipy
  - scikit-learn
  - pip
  - matplotlib
  - jupyter
  - notebook
  - pysoundfile
